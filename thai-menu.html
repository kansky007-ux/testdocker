<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 กินอะไรดี? Thai Food Spin!</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E63946;
    --yellow: #FFD166;
    --green: #06D6A0;
    --orange: #FB8500;
    --bg: #FFF8F0;
    --dark: #1A1A2E;
    --pink: #FF6B9D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Kanit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating decorations */
  .floaty {
    position: fixed;
    font-size: 2rem;
    animation: floatAround linear infinite;
    pointer-events: none;
    opacity: 0.15;
    z-index: 0;
  }
  @keyframes floatAround {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-100px) rotate(360deg); }
  }

  header {
    background: var(--red);
    padding: 1.5rem 2rem;
    text-align: center;
    position: relative;
    border-bottom: 6px solid var(--dark);
    box-shadow: 0 6px 0 var(--orange);
  }
  header h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 4px 4px 0 var(--dark);
    letter-spacing: 2px;
  }
  header p {
    color: white;
    font-size: 1rem;
    margin-top: 0.3rem;
    opacity: 0.9;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
    position: relative;
    z-index: 1;
  }

  /* SPIN SECTION */
  .spin-section {
    background: white;
    border: 4px solid var(--dark);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 8px 8px 0 var(--dark);
    text-align: center;
  }

  .category-tabs {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .tab {
    padding: 0.5rem 1.2rem;
    border: 3px solid var(--dark);
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    background: white;
    transition: all 0.15s;
  }
  .tab:hover { transform: translateY(-2px); }
  .tab.active { background: var(--dark); color: white; }
  .tab.food { border-color: var(--orange); }
  .tab.food.active { background: var(--orange); border-color: var(--orange); }
  .tab.drink { border-color: var(--green); }
  .tab.drink.active { background: var(--green); border-color: var(--green); }
  .tab.all { border-color: var(--red); }
  .tab.all.active { background: var(--red); border-color: var(--red); color: white; }

  /* The food display card */
  .result-card {
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 1.5rem 0;
    position: relative;
  }

  .food-emoji {
    font-size: 6rem;
    line-height: 1;
    margin-bottom: 0.5rem;
    transition: transform 0.1s;
    display: block;
  }
  .food-emoji.spinning {
    animation: spinEmoji 0.08s linear infinite;
  }
  @keyframes spinEmoji {
    0% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.2) rotate(5deg); }
    50% { transform: scale(0.9) rotate(-5deg); }
    75% { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .food-name-th {
    font-size: clamp(2rem, 7vw, 3.5rem);
    font-weight: 900;
    color: var(--dark);
    text-shadow: 3px 3px 0 var(--yellow);
    line-height: 1.1;
  }
  .food-name-en {
    font-size: 1rem;
    color: #888;
    font-family: 'Sarabun', sans-serif;
    margin-top: 0.2rem;
  }
  .food-tag {
    display: inline-block;
    padding: 0.2rem 0.8rem;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-top: 0.5rem;
    border: 2px solid;
  }
  .food-tag.food { background: #FFF3E0; color: var(--orange); border-color: var(--orange); }
  .food-tag.drink { background: #E8F8F5; color: var(--green); border-color: var(--green); }
  .food-tag.spicy::after { content: " 🌶️"; }

  .spin-btn {
    background: var(--red);
    color: white;
    border: 4px solid var(--dark);
    border-radius: 16px;
    padding: 1rem 3rem;
    font-family: 'Kanit', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--dark);
    transition: all 0.1s;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }
  .spin-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--dark); }
  .spin-btn:active { transform: translate(4px, 4px); box-shadow: 1px 1px 0 var(--dark); }
  .spin-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.4s;
  }
  .spin-btn:hover::after { left: 100%; }

  .add-to-day-btn {
    background: var(--green);
    color: var(--dark);
    border: 3px solid var(--dark);
    border-radius: 12px;
    padding: 0.6rem 1.5rem;
    font-family: 'Kanit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--dark);
    margin-top: 1rem;
    transition: all 0.1s;
    display: none;
  }
  .add-to-day-btn.visible { display: inline-block; }
  .add-to-day-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--dark); }
  .add-to-day-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--dark); }

  /* DAILY LOG */
  .daily-section {
    background: white;
    border: 4px solid var(--dark);
    border-radius: 24px;
    padding: 2rem;
    box-shadow: 8px 8px 0 var(--dark);
  }

  .daily-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .daily-header h2 {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--dark);
  }
  .clear-btn {
    background: white;
    border: 2px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    padding: 0.3rem 0.8rem;
    font-family: 'Kanit', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.1s;
  }
  .clear-btn:hover { background: var(--red); color: white; }

  .day-group {
    margin-bottom: 1.5rem;
  }
  .day-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    border-bottom: 2px solid #eee;
    padding-bottom: 0.3rem;
  }
  .log-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .log-item {
    background: var(--bg);
    border: 2px solid var(--dark);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-size: 0.95rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .log-item .remove-item {
    cursor: pointer;
    opacity: 0.4;
    font-size: 0.75rem;
    transition: opacity 0.1s;
    background: none;
    border: none;
    font-family: 'Kanit', sans-serif;
    line-height: 1;
  }
  .log-item .remove-item:hover { opacity: 1; color: var(--red); }

  .empty-log {
    text-align: center;
    color: #ccc;
    padding: 2rem;
    font-size: 1rem;
  }
  .empty-log span { font-size: 3rem; display: block; margin-bottom: 0.5rem; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 999;
    border-radius: 2px;
    animation: confettiFall 1s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100px) rotate(720deg); opacity: 0; }
  }

  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--bg);
    border: 2px solid var(--dark);
    border-radius: 12px;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .stat span { color: var(--red); }
</style>
</head>
<body>

<!-- Floating food emojis bg -->
<div class="floaty" style="left:5%;animation-duration:15s;animation-delay:0s;">🍜</div>
<div class="floaty" style="left:15%;animation-duration:20s;animation-delay:3s;">🌶️</div>
<div class="floaty" style="left:30%;animation-duration:12s;animation-delay:7s;">🥤</div>
<div class="floaty" style="left:50%;animation-duration:18s;animation-delay:2s;">🍛</div>
<div class="floaty" style="left:65%;animation-duration:14s;animation-delay:5s;">🧋</div>
<div class="floaty" style="left:80%;animation-duration:16s;animation-delay:1s;">🍚</div>
<div class="floaty" style="left:90%;animation-duration:11s;animation-delay:9s;">🌿</div>

<header>
  <h1>🍜 กินอะไรดีพี่?</h1>
  <p>Thai Food Randomizer — หมุนแล้วกิน! 🎰</p>
</header>

<div class="container">
  <!-- SPIN SECTION -->
  <div class="spin-section">
    <div class="category-tabs">
      <button class="tab all active" onclick="setCategory('all', this)">🎲 ทั้งหมด</button>
      <button class="tab food" onclick="setCategory('food', this)">🍜 อาหาร</button>
      <button class="tab drink" onclick="setCategory('drink', this)">🧋 เครื่องดื่ม</button>
    </div>

    <div class="result-card">
      <span class="food-emoji" id="foodEmoji">🎰</span>
      <div class="food-name-th" id="foodNameTh">กดสุ่มเลย!</div>
      <div class="food-name-en" id="foodNameEn">Press spin to get your meal</div>
      <div id="foodTag"></div>
    </div>

    <button class="spin-btn" onclick="spin()" id="spinBtn">🎲 สุ่มเมนู!</button>
    <br>
    <button class="add-to-day-btn" id="addBtn" onclick="addToDay()">✅ บันทึกวันนี้</button>
  </div>

  <!-- DAILY LOG -->
  <div class="daily-section">
    <div class="daily-header">
      <h2>📅 บันทึกการกิน</h2>
      <button class="clear-btn" onclick="clearAll()">🗑️ ล้างทั้งหมด</button>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div id="dailyLog"></div>
  </div>
</div>

<script>
const foods = [
  // อาหาร
  { th: "กะเพราไก่", en: "Basil Chicken", emoji: "🍛", type: "food", spicy: true },
  { th: "กะเพราหมู", en: "Basil Pork", emoji: "🍛", type: "food", spicy: true },
  { th: "ก๋วยเตี๋ยวเส้นใหญ่", en: "Wide Rice Noodle Soup", emoji: "🍜", type: "food", spicy: false },
  { th: "ก๋วยเตี๋ยวเส้นเล็ก", en: "Thin Rice Noodle Soup", emoji: "🍜", type: "food", spicy: false },
  { th: "ข้าวหมูแดง", en: "Red BBQ Pork Rice", emoji: "🍖", type: "food", spicy: false },
  { th: "ข้าวมันไก่", en: "Hainanese Chicken Rice", emoji: "🍗", type: "food", spicy: false },
  { th: "ผัดไทย", en: "Pad Thai", emoji: "🍝", type: "food", spicy: false },
  { th: "ส้มตำ", en: "Papaya Salad", emoji: "🥗", type: "food", spicy: true },
  { th: "ต้มยำกุ้ง", en: "Tom Yum Goong", emoji: "🍲", type: "food", spicy: true },
  { th: "แกงเขียวหวาน", en: "Green Curry", emoji: "🍛", type: "food", spicy: true },
  { th: "แกงมัสมั่น", en: "Massaman Curry", emoji: "🍛", type: "food", spicy: false },
  { th: "ข้าวผัดกุ้ง", en: "Shrimp Fried Rice", emoji: "🍚", type: "food", spicy: false },
  { th: "ลาบหมู", en: "Spicy Pork Salad", emoji: "🥩", type: "food", spicy: true },
  { th: "หมูสะเต๊ะ", en: "Pork Satay", emoji: "🍡", type: "food", spicy: false },
  { th: "ปลาราดพริก", en: "Chili Fish", emoji: "🐟", type: "food", spicy: true },
  { th: "ข้าวต้ม", en: "Rice Congee", emoji: "🥣", type: "food", spicy: false },
  { th: "หมูกระทะ", en: "Thai BBQ Pork Grill", emoji: "🥓", type: "food", spicy: false },
  { th: "ไข่เจียว", en: "Thai Omelette", emoji: "🍳", type: "food", spicy: false },
  { th: "มะม่วงข้าวเหนียว", en: "Mango Sticky Rice", emoji: "🥭", type: "food", spicy: false },
  { th: "ขนมจีน", en: "Thai Rice Noodle", emoji: "🍜", type: "food", spicy: false },
  { th: "หมูทอดกระเทียม", en: "Garlic Fried Pork", emoji: "🍖", type: "food", spicy: false },
  { th: "ผัดซีอิ๊ว", en: "Stir-fried Soy Sauce Noodles", emoji: "🍝", type: "food", spicy: false },
  { th: "ราดหน้า", en: "Gravy Noodles", emoji: "🍜", type: "food", spicy: false },
  { th: "ไก่ย่าง", en: "Grilled Chicken", emoji: "🍗", type: "food", spicy: false },
  { th: "ต้มข่าไก่", en: "Galangal Chicken Soup", emoji: "🍲", type: "food", spicy: false },
  // เครื่องดื่ม
  { th: "ชาเย็น", en: "Thai Iced Tea", emoji: "🧡", type: "drink", spicy: false },
  { th: "โอเลี้ยง", en: "Thai Iced Coffee", emoji: "☕", type: "drink", spicy: false },
  { th: "น้ำมะพร้าว", en: "Coconut Water", emoji: "🥥", type: "drink", spicy: false },
  { th: "น้ำใบเตย", en: "Pandan Juice", emoji: "🍵", type: "drink", spicy: false },
  { th: "น้ำอ้อย", en: "Sugar Cane Juice", emoji: "🥤", type: "drink", spicy: false },
  { th: "น้ำตะไคร้", en: "Lemongrass Juice", emoji: "🍹", type: "drink", spicy: false },
  { th: "น้ำมะนาว", en: "Lime Juice", emoji: "🍋", type: "drink", spicy: false },
  { th: "นมสด", en: "Fresh Milk", emoji: "🥛", type: "drink", spicy: false },
  { th: "น้ำขิง", en: "Ginger Juice", emoji: "🫚", type: "drink", spicy: true },
  { th: "เปปซี่/โค้ก", en: "Soda", emoji: "🥤", type: "drink", spicy: false },
  { th: "น้ำสมุนไพรรวม", en: "Herbal Juice", emoji: "🌿", type: "drink", spicy: false },
];

let currentCategory = 'all';
let currentItem = null;
let isSpinning = false;

function setCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function getFiltered() {
  if (currentCategory === 'all') return foods;
  return foods.filter(f => f.type === currentCategory);
}

function spin() {
  if (isSpinning) return;
  isSpinning = true;

  const btn = document.getElementById('spinBtn');
  btn.textContent = '⏳ กำลังสุ่ม...';
  btn.style.background = '#888';
  document.getElementById('addBtn').classList.remove('visible');

  const list = getFiltered();
  let count = 0;
  const totalSpins = 18 + Math.floor(Math.random() * 10);

  const emojiEl = document.getElementById('foodEmoji');
  const nameEl = document.getElementById('foodNameTh');
  const enEl = document.getElementById('foodNameEn');

  emojiEl.classList.add('spinning');

  const interval = setInterval(() => {
    const random = list[Math.floor(Math.random() * list.length)];
    emojiEl.textContent = random.emoji;
    nameEl.textContent = random.th;
    enEl.textContent = random.en;
    count++;

    if (count >= totalSpins) {
      clearInterval(interval);
      emojiEl.classList.remove('spinning');
      currentItem = list[Math.floor(Math.random() * list.length)];
      emojiEl.textContent = currentItem.emoji;
      nameEl.textContent = currentItem.th;
      enEl.textContent = currentItem.en;

      // Tag
      const tagEl = document.getElementById('foodTag');
      tagEl.innerHTML = `<span class="food-tag ${currentItem.type}${currentItem.spicy ? ' spicy' : ''}">${currentItem.type === 'food' ? '🍜 อาหาร' : '🥤 เครื่องดื่ม'}${currentItem.spicy ? '' : ''}</span>`;

      btn.textContent = '🎲 สุ่มอีกครั้ง!';
      btn.style.background = 'var(--red)';
      document.getElementById('addBtn').classList.add('visible');
      isSpinning = false;
      spawnConfetti();
    }
  }, 80);
}

function spawnConfetti() {
  const colors = ['#E63946','#FFD166','#06D6A0','#FB8500','#FF6B9D'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${30 + Math.random() * 40}%;
      top: 40%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 10}px;
      height: ${6 + Math.random() * 10}px;
      animation-delay: ${Math.random() * 0.3}s;
      animation-duration: ${0.8 + Math.random() * 0.5}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

// DAILY LOG
function getLog() {
  try { return JSON.parse(localStorage.getItem('thaiLog') || '{}'); } catch { return {}; }
}
function saveLog(log) {
  localStorage.setItem('thaiLog', JSON.stringify(log));
}
function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function addToDay() {
  if (!currentItem) return;
  const log = getLog();
  const key = todayKey();
  if (!log[key]) log[key] = [];
  log[key].push({ ...currentItem, time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) });
  saveLog(log);
  renderLog();

  document.getElementById('addBtn').textContent = '✅ บันทึกแล้ว!';
  setTimeout(() => {
    document.getElementById('addBtn').textContent = '✅ บันทึกวันนี้';
  }, 1500);
}

function removeItem(dateKey, index) {
  const log = getLog();
  log[dateKey].splice(index, 1);
  if (log[dateKey].length === 0) delete log[dateKey];
  saveLog(log);
  renderLog();
}

function clearAll() {
  if (confirm('ล้างบันทึกทั้งหมดเลยนะ?')) {
    localStorage.removeItem('thaiLog');
    renderLog();
  }
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - d) / 86400000);
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  const label = d.toLocaleDateString('th-TH', opts);
  if (diff === 0) return `📅 วันนี้ — ${label}`;
  if (diff === 1) return `⬅️ เมื่อวาน — ${label}`;
  return `🗓️ ${label}`;
}

function renderLog() {
  const log = getLog();
  const logEl = document.getElementById('dailyLog');
  const statsEl = document.getElementById('statsBar');
  const keys = Object.keys(log).sort().reverse();

  if (keys.length === 0) {
    logEl.innerHTML = `<div class="empty-log"><span>🍽️</span>ยังไม่มีบันทึกเลย<br>ลองสุ่มแล้วกด "บันทึกวันนี้" ดูสิ!</div>`;
    statsEl.innerHTML = '';
    return;
  }

  // Stats
  const allItems = keys.flatMap(k => log[k]);
  const foodCount = allItems.filter(i => i.type === 'food').length;
  const drinkCount = allItems.filter(i => i.type === 'drink').length;
  statsEl.innerHTML = `
    <div class="stat">🍜 อาหาร: <span>${foodCount}</span> ครั้ง</div>
    <div class="stat">🥤 เครื่องดื่ม: <span>${drinkCount}</span> ครั้ง</div>
    <div class="stat">📆 วันทั้งหมด: <span>${keys.length}</span> วัน</div>
  `;

  logEl.innerHTML = keys.map(k => `
    <div class="day-group">
      <div class="day-label">${formatDateLabel(k)}</div>
      <div class="log-items">
        ${log[k].map((item, i) => `
          <div class="log-item">
            ${item.emoji} ${item.th}
            <span style="color:#aaa;font-size:0.75rem">${item.time || ''}</span>
            <button class="remove-item" onclick="removeItem('${k}', ${i})">✕</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

renderLog();
