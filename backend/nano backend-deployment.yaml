apiVersion: apps/v1
kind: Deployment
metadata:
  name: thai-menu-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: thai-menu-api
  template:
    metadata:
      labels:
        app: thai-menu-api
    spec:
      containers:
      - name: api
        image: thai-menu-api:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
