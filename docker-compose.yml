version: "3.9"

services:
  backend:
    build: ./backend
    container_name: thaifood-api
    restart: unless-stopped
    volumes:
      - thaifood_data:/data        # SQLite database persists here
    environment:
      - PORT=3001
    networks:
      - thaifood_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: thaifood-web
    restart: unless-stopped
    ports:
      - "8888:80"                  # ← access at http://<proxmox-ip>:8888
    depends_on:
      - backend
    networks:
      - thaifood_net

volumes:
  thaifood_data:
    driver: local

networks:
  thaifood_net:
    driver: bridge
